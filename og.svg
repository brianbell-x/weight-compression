<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      .ink { fill: #141412; }
      .ink2 { fill: #57544C; }
      .red { fill: #D92B1C; }
      .stroke { stroke: #141412; stroke-width: 1.5; fill: none; }
      .mono { font-family: Consolas, "Courier New", monospace; font-weight: 700; }
      .black { font-family: "Arial Black", Arial, sans-serif; font-weight: 900; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="#F2F0EA"/>

  <text x="72" y="82" class="mono ink2" font-size="17" letter-spacing="3">[ PUBLIC PROGRESS LOG ]</text>
  <text x="1128" y="82" text-anchor="end" class="mono ink2" font-size="17" letter-spacing="3">ONGOING</text>
  <line x1="72" y1="104" x2="1128" y2="104" class="stroke"/>

  <text x="68" y="196" class="black ink" font-size="60" letter-spacing="-2">LOSSLESS MODEL COMPRESSION</text>

  <text x="60" y="412" class="black red" font-size="185" letter-spacing="-7">30.03%</text>
  <text x="880" y="356" class="black ink" font-size="42" letter-spacing="-1">SMALLER</text>
  <text x="880" y="404" class="black ink" font-size="42" letter-spacing="-1">SO FAR</text>

  <g transform="translate(72 474)">
    <rect x="0" y="0" width="1056" height="42" class="stroke"/>
    <rect x="0" y="0" width="317" height="42" class="red"/>
    <rect x="359" y="0" width="697" height="42" fill="#E9E6DE"/>
    <line x1="359" y1="-9" x2="359" y2="51" stroke="#D92B1C" stroke-width="2" stroke-dasharray="6 6"/>
    <text x="359" y="-19" text-anchor="middle" class="mono ink2" font-size="15" letter-spacing="2">MEASURED LIMIT ~34%</text>
  </g>

  <text x="72" y="578" class="mono ink" font-size="21" letter-spacing="2">IN STORAGE AND IN VRAM &#183; BIT-EXACT &#183; IDENTICAL OUTPUTS</text>
</svg>
