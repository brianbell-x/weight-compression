<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs><style>
    .ink{fill:#141412}.ink2{fill:#57544C}.red{fill:#D92B1C}
    .stroke{stroke:#141412;stroke-width:1.5;fill:none}
    .mono{font-family:Consolas,"Courier New",monospace;font-weight:700}
    .black{font-family:"Arial Black",Arial,sans-serif;font-weight:900}
  </style></defs>
  <rect width="1200" height="630" fill="#F2F0EA"/>

  <text x="70" y="104" class="black ink" font-size="60" letter-spacing="-2">LOSSLESS MODEL COMPRESSION</text>
  <line x1="72" y1="132" x2="1128" y2="132" class="stroke"/>

  <!-- box1 ORIGINAL: Ultra 550B weights (full size) -->
  <g transform="translate(150 200)">
    <text x="0" y="-14" class="mono ink2" font-size="18" letter-spacing="2">ORIGINAL</text>
    <rect x="0" y="0" width="330" height="290" fill="#E9E6DE"/>
    <rect x="0" y="0" width="330" height="290" class="stroke"/>
    <text x="165" y="82" text-anchor="middle" class="mono ink" font-size="18" letter-spacing="1">NEMOTRON-3 ULTRA 550B</text>
    <text x="165" y="182" text-anchor="middle" class="black ink" font-size="58" letter-spacing="-2">1,044 GB</text>
    <text x="165" y="244" text-anchor="middle" class="mono ink2" font-size="15" letter-spacing="1">model.safetensors &#183; BF16</text>
  </g>

  <!-- arrow -->
  <path d="M520 333 L588 333 L588 311 L626 345 L588 379 L588 357 L520 357 Z" class="red"/>

  <!-- box2 IN VRAM: dashed ghost = full original size; red = compressed block holding the numbers -->
  <g transform="translate(680 200)">
    <text x="0" y="-14" class="mono ink2" font-size="18" letter-spacing="2">IN VRAM</text>
    <rect x="0" y="0" width="330" height="290" class="stroke" stroke-dasharray="7 7"/>
    <rect x="35" y="45" width="260" height="200" class="red"/>
    <rect x="35" y="45" width="260" height="200" class="stroke"/>
    <text x="165" y="123" text-anchor="middle" class="black" fill="#F2F0EA" font-size="52" letter-spacing="-3">&#8722;294 GB</text>
    <text x="165" y="173" text-anchor="middle" class="black" fill="#F2F0EA" font-size="34" letter-spacing="-1">750 GB</text>
    <text x="165" y="213" text-anchor="middle" class="mono" fill="#F2F0EA" font-size="16" letter-spacing="1">28.20% COMPRESSION</text>
    <text x="165" y="278" text-anchor="middle" class="mono ink2" font-size="14" letter-spacing="1">NEVER RE-INFLATED</text>
  </g>

  <text x="600" y="566" text-anchor="middle" class="mono ink" font-size="23" letter-spacing="2">READ IN PLACE ON THE GPU &#183; SHA-256 MATCH &#183; NO QUALITY TRADEOFF</text>
</svg>
