<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs><style>
    .ink{fill:#141412}.ink2{fill:#57544C}.red{fill:#D92B1C}
    .stroke{stroke:#141412;stroke-width:1.5;fill:none}
    .mono{font-family:Consolas,"Courier New",monospace;font-weight:700}
    .black{font-family:"Arial Black",Arial,sans-serif;font-weight:900}
  </style></defs>
  <rect width="1200" height="630" fill="#F2F0EA"/>
  <text x="72" y="80" class="mono ink2" font-size="17" letter-spacing="3">[ PUBLIC PROGRESS LOG ]</text>
  <text x="1128" y="80" text-anchor="end" class="mono ink2" font-size="17" letter-spacing="3">ONGOING</text>
  <line x1="72" y1="102" x2="1128" y2="102" class="stroke"/>
  <text x="68" y="180" class="black ink" font-size="58" letter-spacing="-2">LOSSLESS MODEL COMPRESSION</text>

  <!-- box1 ORIGINAL: Ultra 550B weights -->
  <g transform="translate(72 270)">
    <text x="0" y="-16" class="mono ink2" font-size="16" letter-spacing="2">ORIGINAL</text>
    <rect x="0" y="0" width="322" height="240" fill="#E9E6DE"/>
    <rect x="0" y="0" width="322" height="240" class="stroke"/>
    <text x="161" y="74" text-anchor="middle" class="mono ink" font-size="16" letter-spacing="1">NEMOTRON-3 ULTRA 550B</text>
    <text x="161" y="150" text-anchor="middle" class="black ink" font-size="52" letter-spacing="-2">1,044 GB</text>
    <text x="161" y="196" text-anchor="middle" class="mono ink2" font-size="13" letter-spacing="1">model.safetensors &#183; BF16</text>
  </g>
  <!-- arrow 1 -->
  <path d="M414 376 L484 376 L484 358 L518 390 L484 422 L484 404 L414 404 Z" class="red"/>
  <!-- box2 COMPRESSED -->
  <g transform="translate(520 300)">
    <text x="0" y="-16" class="mono ink2" font-size="16" letter-spacing="2">COMPRESSED</text>
    <rect x="0" y="0" width="280" height="180" class="red"/>
    <rect x="0" y="0" width="280" height="180" class="stroke"/>
    <text x="140" y="70" text-anchor="middle" class="black" fill="#F2F0EA" font-size="48" letter-spacing="-3">&#8722;294 GB</text>
    <text x="140" y="116" text-anchor="middle" class="black" fill="#F2F0EA" font-size="30" letter-spacing="-1">750 GB</text>
    <text x="140" y="152" text-anchor="middle" class="mono" fill="#F2F0EA" font-size="16" letter-spacing="1">28.20% COMPRESSION</text>
  </g>
  <!-- arrow 2 -->
  <path d="M808 376 L876 376 L876 358 L906 390 L876 422 L876 404 L808 404 Z" class="red"/>
  <!-- box3 IN VRAM: stays compressed -->
  <g transform="translate(908 270)">
    <text x="0" y="-16" class="mono ink2" font-size="16" letter-spacing="2">IN VRAM</text>
    <rect x="0" y="0" width="204" height="240" class="stroke" stroke-dasharray="7 7"/>
    <rect x="0" y="50" width="204" height="140" class="red"/>
    <rect x="0" y="50" width="204" height="140" class="stroke"/>
    <text x="102" y="112" text-anchor="middle" class="black" fill="#F2F0EA" font-size="26" letter-spacing="-1">STILL</text>
    <text x="102" y="142" text-anchor="middle" class="mono" fill="#F2F0EA" font-size="14" letter-spacing="1">COMPRESSED</text>
    <text x="102" y="226" text-anchor="middle" class="mono ink2" font-size="12" letter-spacing="1">NEVER RE-INFLATED</text>
  </g>

  <text x="72" y="590" class="mono ink" font-size="20" letter-spacing="2">READ IN PLACE ON THE GPU &#183; IDENTICAL OUTPUTS &#183; NO QUALITY TRADEOFF</text>
</svg>
