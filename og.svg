<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs><style>
    .ink{fill:#141412}.ink2{fill:#57544C}.red{fill:#D92B1C}
    .stroke{stroke:#141412;stroke-width:1.5;fill:none}
    .mono{font-family:Consolas,"Courier New",monospace;font-weight:700}
    .black{font-family:"Arial Black",Arial,sans-serif;font-weight:900}
  </style></defs>
  <rect width="1200" height="630" fill="#F2F0EA"/>
  <text x="72" y="80" class="mono ink2" font-size="17" letter-spacing="3">[ PUBLIC PROGRESS LOG ]</text>
  <text x="1128" y="80" text-anchor="end" class="mono ink2" font-size="17" letter-spacing="3">ONGOING</text>
  <line x1="72" y1="102" x2="1128" y2="102" class="stroke"/>
  <text x="68" y="180" class="black ink" font-size="58" letter-spacing="-2">LOSSLESS MODEL COMPRESSION</text>

  <!-- box1 ORIGINAL: the family of weights -->
  <g transform="translate(72 268)">
    <text x="0" y="-16" class="mono ink2" font-size="16" letter-spacing="2">ORIGINAL</text>
    <rect x="0" y="0" width="286" height="244" fill="#E9E6DE"/>
    <rect x="0" y="0" width="286" height="244" class="stroke"/>
    <text x="143" y="88" text-anchor="middle" class="black ink" font-size="25" letter-spacing="-1">NEMOTRON-3</text>
    <text x="143" y="134" text-anchor="middle" class="mono ink" font-size="17" letter-spacing="1">NANO 30B</text>
    <text x="143" y="162" text-anchor="middle" class="mono ink" font-size="17" letter-spacing="1">ULTRA 550B</text>
    <text x="143" y="212" text-anchor="middle" class="mono ink2" font-size="13" letter-spacing="1">model.safetensors &#183; BF16</text>
  </g>
  <!-- arrow 1 -->
  <path d="M382 372 L452 372 L452 354 L490 388 L452 422 L452 404 L382 404 Z" class="red"/>
  <!-- box2 COMPRESSED: both models -->
  <g transform="translate(508 300)">
    <text x="0" y="-16" class="mono ink2" font-size="16" letter-spacing="2">COMPRESSED</text>
    <rect x="0" y="0" width="316" height="180" class="red"/>
    <rect x="0" y="0" width="316" height="180" class="stroke"/>
    <text x="22" y="66" class="mono" fill="#F2F0EA" font-size="17" letter-spacing="1">NANO 30B</text>
    <text x="294" y="70" text-anchor="end" class="black" fill="#F2F0EA" font-size="32" letter-spacing="-2">&#8722;30.03%</text>
    <line x1="22" y1="90" x2="294" y2="90" stroke="#F2F0EA" stroke-width="1" opacity=".4"/>
    <text x="22" y="132" class="mono" fill="#F2F0EA" font-size="17" letter-spacing="1">ULTRA 550B</text>
    <text x="294" y="136" text-anchor="end" class="black" fill="#F2F0EA" font-size="32" letter-spacing="-2">&#8722;28.20%</text>
    <text x="158" y="166" text-anchor="middle" class="mono" fill="#F2F0EA" font-size="12" letter-spacing="2">SMALLER &#183; BIT-EXACT</text>
  </g>
  <!-- arrow 2 -->
  <path d="M846 372 L916 372 L916 354 L954 388 L916 422 L916 404 L846 404 Z" class="red"/>
  <!-- box3 IN VRAM: stays compressed -->
  <g transform="translate(972 268)">
    <text x="0" y="-16" class="mono ink2" font-size="16" letter-spacing="2">IN VRAM</text>
    <rect x="0" y="0" width="156" height="244" class="stroke" stroke-dasharray="7 7"/>
    <rect x="0" y="52" width="156" height="140" class="red"/>
    <rect x="0" y="52" width="156" height="140" class="stroke"/>
    <text x="78" y="110" text-anchor="middle" class="black" fill="#F2F0EA" font-size="22" letter-spacing="-1">STILL</text>
    <text x="78" y="138" text-anchor="middle" class="mono" fill="#F2F0EA" font-size="13" letter-spacing="1">COMPRESSED</text>
    <text x="78" y="228" text-anchor="middle" class="mono ink2" font-size="12" letter-spacing="1">NEVER RE-INFLATED</text>
  </g>

  <text x="72" y="590" class="mono ink" font-size="20" letter-spacing="2">READ IN PLACE ON THE GPU &#183; IDENTICAL OUTPUTS &#183; NO QUALITY TRADEOFF</text>
</svg>
