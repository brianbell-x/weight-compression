name: Deploy site to Pages

on:
  push:
    branches: [main]
    paths:
      - "Split12/site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Stage site under /Split12
        run: |
          mkdir -p _site/Split12
          cp -r Split12/site/. _site/Split12/
          printf '%s\n' '<!doctype html><meta http-equiv="refresh" content="0; url=Split12/"><link rel="canonical" href="Split12/"><a href="Split12/">Split12 writeup</a>' > _site/index.html
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
